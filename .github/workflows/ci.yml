name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & test Express backend
        working-directory: express
        run: |
          npm ci
          npm test

      - name: Install & lint frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
